<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids - Reels</title>
    <style>
        /* CAMBIO 1: Permitir overflow en el body para que el contenedor interno mande */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        
        /* CAMBIO 2: Asegurar que el contenedor ocupe toda la pantalla y tenga scroll */
        .scroll-container { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Suavidad en iPhone */
        }
        
        .reel-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; scroll-snap-stop: always; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%); }
        .branding { position: absolute; top: 30px; left: 20px; color: #fff; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); pointer-events: auto; }
        .btn-compra { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: #ffeb3b; color: #000; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; }
        
        .modal-entrega { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; z-index: 2000; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px;
        }
        .btn-opcion { display: block; margin: 10px 0; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; }
        .audio-hint { position: absolute; top: 80px; left: 20px; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="selectorEntrega" class="modal-entrega">
        <h3 style="color: #333;">¿Dónde recibir tu PDF?</h3>
        <a id="link-tg" href="#" target="_blank" class="btn-opcion" style="background: #0088cc;">Enviar por Telegram</a>
        <a id="link-google" href="#" target="_blank" class="btn-opcion" style="background: #db4437;">Enviar por Google</a>
        <button onclick="cerrarSelector()" style="margin-top:10px; background:none; border:none; color:gray;">Cerrar</button>
    </div>

    <div class="scroll-container">

        <div class="reel-container">
            <video class="video-reel" autoplay muted loop playsinline>
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/animalitos_dwothk.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para activar sonido 🔊</div>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('https://t.me/TuBot?start=pack_animalitos', 'LINK_DE_GOOGLE_AQUI')">
                ¡Lo quiero! 🎨
            </button>
        </div>

        <div class="reel-container">
            <video class="video-reel" autoplay muted loop playsinline>
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/cuenta_uj2sav.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para activar sonido 🔊</div>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('https://t.me/TuBot?start=pack2', 'URL_GOOGLE_2')">¡Pack Números! 🍎</button>
        </div>

    </div> <script>
        const modal = document.getElementById('selectorEntrega');
        function abrirSelector(tg, google) {
            document.getElementById('link-tg').href = tg;
            document.getElementById('link-google').href = google;
            modal.style.display = 'block';
        }
        function cerrarSelector() { modal.style.display = 'none'; }

        const videos = document.querySelectorAll('.video-reel');
        
        videos.forEach(video => {
            video.addEventListener('click', function() {
                if (video.muted) {
                    video.muted = false;
                    this.parentElement.querySelector('.audio-hint').style.display = 'none';
                } else {
                    video.muted = true;
                    this.parentElement.querySelector('.audio-hint').style.display = 'block';
                }
            });
        });

        document.body.addEventListener('click', function() {
            videos.forEach(v => {
                if (v.muted) { v.muted = false; }
            });
            document.querySelectorAll('.audio-hint').forEach(hint => hint.style.display = 'none');
        }, { once: true });
    </script>
</body>
</html>
