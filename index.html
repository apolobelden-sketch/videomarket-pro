<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids - Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        .reel-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%); }
        .branding { position: absolute; top: 30px; left: 20px; color: #fff; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); pointer-events: auto; }
        .btn-compra { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffeb3b; color: #000; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-wa { position: absolute; bottom: 30px; right: 20px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .scroll-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="reel-container">
            <video autoplay muted loop playsinline>
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/del_1_al_10_r1yecn.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="window.open('https://res.cloudinary.com/dgdw8fbku/image/upload/familia_okunis.pdf')">¡Lo quiero! 🎨</button>
            <div class="btn-wa" onclick="window.open('https://wa.me/TUNUMERO')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
            </div>
        </div>

        <div class="reel-container">
            <video autoplay muted loop playsinline>
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/cuenta_uj2sav.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="window.open('https://res.cloudinary.com/dgdw8fbku/image/upload/cuenta_las_manzanas_r5shma.pdf')">¡Pack Números! 🍎</button>
        </div>
    </div>

</body>
</html>
