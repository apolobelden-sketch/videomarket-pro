
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids - Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        
        .scroll-container { 
            height: 100vh; width: 100vw; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .reel-container { 
            position: relative; width: 100vw; height: 100vh; 
            scroll-snap-align: start; scroll-snap-stop: always; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 40%); }
        .branding { position: absolute; top: 30px; left: 20px; color: #fff; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); z-index: 10; }

        .button-group {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; width: 90%; justify-content: center;
        }

        .btn-main { 
            padding: 15px 25px; border: none; border-radius: 50px; 
            font-weight: bold; font-size: 16px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s;
        }

        .btn-lo-quiero { background: #ffeb3b; color: #000; flex: 2; }
        .btn-actividades { background: rgba(255, 255, 255, 0.2); color: #fff; border: 1px solid #fff; flex: 1; backdrop-filter: blur(5px); }
        
        .btn-main:active { transform: scale(0.95); }

        .modal-entrega { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; z-index: 2000; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px;
        }
        .btn-opcion { display: block; margin: 10px 0; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; }
        .audio-hint { position: absolute; top: 80px; left: 20px; color: white; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="modalActividades" class="modal-entrega">
        <h3 style="color: #333;">Contenido del Pack</h3>
        <p id="desc-actividades" style="color: #666; font-size: 14px;">Cargando detalles...</p>
        <button onclick="cerrarModal('modalActividades')" style="margin-top:10px; background:#333; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Entendido</button>
    </div>

    <div id="selectorEntrega" class="modal-entrega">
        <h3 style="color: #333;">¿Dónde recibir tu PDF?</h3>
        <a id="link-tg" href="#" target="_blank" class="btn-opcion" style="background: #0088cc;">Enviar por Telegram</a>
        <a id="link-google" href="#" target="_blank" class="btn-opcion" style="background: #db4437;">Enviar por Gmail</a>
        <button onclick="cerrarModal('selectorEntrega')" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cerrar</button>
    </div>

    <div class="scroll-container">
        <div class="reel-container">
            <video class="video-reel" loop playsinline muted preload="auto">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/q_auto,f_mp4/Cuento_1_El_Leon_Happy_jujtwm.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para sonido 🔊</div>
            <div class="branding">El León Valiente ✨</div>
            <div class="button-group">
                <button class="btn-main btn-lo-quiero" onclick="abrirSelector('https://t.me/TU_BOT?start=leon1', 'G_LINK_LEON')">¡Lo quiero! 🦁</button>
                <button class="btn-main btn-actividades" onclick="verActividades('Este pack incluye el cuento del León y 10 páginas interactivas para colorear.')">Actividades</button>
            </div>
        </div>

        <div class="reel-container">
            <video class="video-reel" loop playsinline muted preload="auto">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/q_auto,f_mp4/animalitos_dwothk.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para sonido 🔊</div>
            <div class="branding">Happy Kids ✨</div>
            <div class="button-group">
                <button class="btn-main btn-lo-quiero" onclick="abrirSelector('https://t.me/TU_BOT?start=pack1', 'G_LINK_1')">¡Lo quiero! 🎨</button>
                <button class="btn-main btn-actividades" onclick="verActividades('Este pack incluye 20 páginas de dibujo, trazos de animales y nombres para colorear.')">Actividades</button>
            </div>
        </div>

        <div class="reel-container">
            <video class="video-reel" loop playsinline muted preload="auto">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/q_auto,f_mp4/cuenta_uj2sav.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para sonido 🔊</div>
            <div class="branding">Happy Kids ✨</div>
            <div class="button-group">
                <button class="btn-main btn-lo-quiero" onclick="abrirSelector('https://t.me/TU_BOT?start=pack2', 'G_LINK_2')">¡Lo quiero! 🍎</button>
                <button class="btn-main btn-actividades" onclick="verActividades('Aprende a contar con manzanas: incluye ejercicios de suma básica y reconocimiento de números.')">Actividades</button>
            </div>
        </div>
    </div>

    <script>
        const videos = document.querySelectorAll('.video-reel');
        let audioActivado = false;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    video.play();
                    if (audioActivado) video.muted = false;
                } else {
                    video.pause();
                    video.muted = true;
                }
            });
        }, { threshold: 0.6 });
        videos.forEach(v => observer.observe(v));

        videos.forEach(v => {
            v.addEventListener('click', function() {
                audioActivado = true;
                document.querySelectorAll('.audio-hint').forEach(h => h.style.display = 'none');
                this.muted = !this.muted;
            });
        });

        function abrirSelector(tg, google) {
            document.getElementById('link-tg').href = tg;
            document.getElementById('link-google').href = google;
            document.getElementById('selectorEntrega').style.display = 'block';
        }

        function verActividades(texto) {
            document.getElementById('desc-actividades').innerText = texto;
            document.getElementById('modalActividades').style.display = 'block';
        }

        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
