<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Kids</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Nunito&display=swap" rel="stylesheet">

<style>

:root {
    --hk-primary:#FF6B6B;
    --hk-math:#6C5CE7;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Nunito';
    background:#111;
    color:#fff;
    overflow:hidden;
}

/* NAV */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#000;
}

.nav-item{
    flex:1;
    text-align:center;
    padding:10px;
    cursor:pointer;
}

/* SECTIONS */
.section{display:none;height:100vh}
.section.active{display:block}

/* REELS */
.reels-container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.reel-card{
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}

.reel-video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CATALOGO */
.catalog-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

/* MATH */
.fraction-display{
    display:flex;
    justify-content:center;
    gap:20px;
    font-size:40px;
}

/* CARRUSEL (AGREGADO) */
.carousel-container{position:relative}
.carousel-slide{display:none}
.carousel-slide.active{display:block}
.carousel-container img{width:100%}

</style>
</head><body>

<div class="app-container">

<main id="mainContent">

<section id="section-inicio" class="section active">
<div id="reelsContainer" class="reels-container"></div>
</section>

<section id="section-colorear" class="section">
<div class="catalog-grid" id="catalogGrid"></div>
</section>

<section id="section-mate" class="section">

<div class="fraction-display">
<input id="mathAnswerNum">
<input id="mathAnswerDen">
</div>

<button onclick="checkFraction()">Verificar</button>

<div id="quickProblem"></div>
<div id="quickOptions"></div>

</section>

</main>

<nav class="bottom-nav">
<div class="nav-item" onclick="goTo('inicio')">🏠</div>
<div class="nav-item" onclick="goTo('colorear')">🛍️</div>
<div class="nav-item" onclick="goTo('mate')">🔢</div>
</nav>

</div><script>

let reelsObserver=null;
let audioEnabled=false;

/* NAV */
function goTo(section){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById('section-'+section).classList.add('active');

if(section==='inicio') loadReels();
if(section==='colorear') loadCatalog();
}

/* REELS */
function loadReels(){

const container=document.getElementById('reelsContainer');

if(container.children.length>0)return;

for(let i=0;i<5;i++){
const reel=document.createElement('div');
reel.className='reel-card';

reel.innerHTML=`
<video class="reel-video" muted loop>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>
`;

container.appendChild(reel);
}

setupVideoObserver();
}

/* OBSERVER (FIX) */
function setupVideoObserver(){

if(reelsObserver) reelsObserver.disconnect();

const videos=document.querySelectorAll('.reel-video');

reelsObserver=new IntersectionObserver(entries=>{
entries.forEach(e=>{
const v=e.target;

if(e.isIntersecting){
v.play();
v.muted=!audioEnabled;
}else{
v.pause();
v.currentTime=0;
}
});
},{threshold:0.6});

videos.forEach(v=>reelsObserver.observe(v));
}

/* AUDIO */
function toggleAudio(){
audioEnabled=!audioEnabled;
document.querySelectorAll('video').forEach(v=>v.muted=!audioEnabled);
}

/* CATALOGO */
function loadCatalog(){
const grid=document.getElementById('catalogGrid');

if(grid.children.length>0)return;

for(let i=0;i<6;i++){
const div=document.createElement('div');
div.innerHTML="Producto "+i;
grid.appendChild(div);
}
}

/* MATH */
function checkFraction(){
alert("Funciona");
}

/* INIT (SOLO UNA VEZ) */
window.addEventListener('DOMContentLoaded',()=>{
loadReels();
});

</script>

</body>
</html>
