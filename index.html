<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids - Reels Educativos</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        .scroll-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .reel-container { position: relative; width: 100vw; height: 100vh; scroll-snap-align: start; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 40%); }
        .branding { position: absolute; top: 30px; left: 20px; color: #fff; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); z-index: 10; }
        
        .btn-compra { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: #ffeb3b; color: #000; padding: 18px 40px; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }

        /* Modal */
        .modal-entrega { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 30px; z-index: 2000; text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); width: 85%; max-width: 320px;
        }
        .btn-opcion { display: flex; align-items: center; justify-content: center; margin: 12px 0; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div id="selectorEntrega" class="modal-entrega">
        <h3>¿Dónde recibir tu PDF? ✨</h3>
        <a id="link-tg" href="#" target="_blank" class="btn-opcion" style="background: #0088cc;">🔵 Telegram</a>
        <a id="link-google" href="#" target="_blank" class="btn-opcion" style="background: #db4437;">🔴 Google / Gmail</a>
        <button onclick="cerrarSelector()" style="margin-top:15px; background:none; border:none; color:#888;">Cerrar</button>
    </div>

    <div class="scroll-container">
        
        <div class="reel-container">
            <video autoplay muted loop playsinline preload="auto">
                <source src="URL_DE_TU_NUEVO_VIDEO_AQUÍ" type="video/mp4">
                Tu navegador no soporta video.
            </video>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('pack1', 'https://t.me/TuBot?start=pack1', 'LINK_GOOGLE_1')">¡Lo quiero! 🎨</button>
        </div>

        <div class="reel-container">
            <video id="video2" loop playsinline preload="auto" onclick="this.paused ? this.play() : this.pause();">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/cuenta_uj2sav.mp4" type="video/mp4">
            </video>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('pack2', 'https://t.me/TuBot?start=pack2', 'LINK_GOOGLE_2')">¡Pack Números! 🍎</button>
            <p style="position:absolute; bottom:80px; color:white; font-size:12px; width:100%; text-align:center; pointer-events:none;">Pica el video para activar sonido 🔊</p>
        </div>

    </div>

    <script>
        const modal = document.getElementById('selectorEntrega');
        const linkTg = document.getElementById('link-tg');
        const linkGoogle = document.getElementById('link-google');

        function abrirSelector(prod, urlTg, urlG) {
            linkTg.href = urlTg;
            linkGoogle.href = urlG;
            modal.style.display = 'block';
        }

        function cerrarSelector() { modal.style.display = 'none'; }

        // Intento de reproducir el video 2 con sonido al primer toque en la pantalla
        document.body.addEventListener('click', function() {
            const v2 = document.getElementById('video2');
            if (v2.muted) {
                v2.muted = false;
                v2.play();
            }
        }, {once: true});
    </script>
</body>
</html>
