<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Kids - Reels</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        
        .scroll-container { 
            height: 100vh; 
            width: 100vw;
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .reel-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            scroll-snap-align: start; 
            scroll-snap-stop: always; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%); }
        .branding { position: absolute; top: 30px; left: 20px; color: #fff; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); z-index: 10; }
        .btn-compra { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: #ffeb3b; color: #000; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .modal-entrega { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; z-index: 2000; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px;
        }
        .btn-opcion { display: block; margin: 10px 0; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; }
        .audio-hint { position: absolute; top: 80px; left: 20px; color: white; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; pointer-events: none; z-index: 10; border: 1px solid white; }
    </style>
</head>
<body>

    <div id="selectorEntrega" class="modal-entrega">
        <h3 style="color: #333;">¿Dónde recibir tu PDF?</h3>
        <a id="link-tg" href="#" target="_blank" class="btn-opcion" style="background: #0088cc;">Enviar por Telegram</a>
        <a id="link-google" href="#" target="_blank" class="btn-opcion" style="background: #db4437;">Enviar por Gmail</a>
        <button onclick="cerrarSelector()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cerrar</button>
    </div>

    <div class="scroll-container">
        <div class="reel-container">
            <video class="video-reel" loop playsinline muted preload="auto">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/q_auto,f_mp4/animalitos_dwothk.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para activar sonido 🔊</div>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('https://t.me/TU_BOT?start=pack1', 'LINK_1')">¡Lo quiero! 🎨</button>
        </div>

        <div class="reel-container">
            <video class="video-reel" loop playsinline muted preload="auto">
                <source src="https://res.cloudinary.com/dgdw8fbku/video/upload/q_auto,f_mp4/cuenta_uj2sav.mp4" type="video/mp4">
            </video>
            <div class="audio-hint">Toca para activar sonido 🔊</div>
            <div class="overlay"></div>
            <div class="branding">Happy Kids ✨</div>
            <button class="btn-compra" onclick="abrirSelector('https://t.me/TU_BOT?start=pack2', 'LINK_2')">¡Pack Números! 🍎</button>
        </div>
    </div>

    <script>
        const videos = document.querySelectorAll('.video-reel');
        let isGlobalAudioEnabled = false;

        // Lógica de Intersección (Scroll)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    // Si entra en pantalla, lo reproducimos
                    video.play();
                    // Si el usuario ya activó el audio globalmente, le quitamos el mute
                    if (isGlobalAudioEnabled) {
                        video.muted = false;
                    }
                } else {
                    // Si sale de pantalla, se pausa y se calla
                    video.pause();
                    video.muted = true;
                }
            });
        }, { threshold: 0.6 });

        videos.forEach(v => observer.observe(v));

        // Al hacer clic por primera vez en cualquier video:
        videos.forEach(video => {
            video.addEventListener('click', function() {
                if (!isGlobalAudioEnabled) {
                    // ACTIVACIÓN GLOBAL
                    isGlobalAudioEnabled = true;
                    // Quitamos todos los letreros de "Toca para sonido"
                    document.querySelectorAll('.audio-hint').forEach(h => h.style.display = 'none');
                }
                
                // Toggle de este video específico
                if (video.muted) {
                    video.muted = false;
                    video.play();
                } else {
                    video.muted = true;
                }
            });
        });

        // Modal (sin cambios)
        function abrirSelector(tg, google) {
            document.getElementById('link-tg').href = tg;
            document.getElementById('link-google').href = google;
            document.getElementById('selectorEntrega').style.display = 'block';
        }
        function cerrarSelector() { document.getElementById('selectorEntrega').style.display = 'none'; }
    </script>
</body>
</html>
