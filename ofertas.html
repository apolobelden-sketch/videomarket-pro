<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Kids - Súper Tablet de Arte 🎨</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #333; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }

        /* 1. CARRUSEL DE PLANTILLAS (NÍTIDO Y CLARO) */
        #carousel-container {
            height: 15vh; background: #fff; border-bottom: 2px solid #ddd;
            display: flex; align-items: center; overflow-x: auto; padding: 10px;
            scroll-snap-type: x mandatory;
        }
        #carousel-container::-webkit-scrollbar { height: 8px; }
        #carousel-container::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
        
        .template-thumb { 
            height: 90%; aspect-ratio: 1/1; 
            margin-right: 15px; border-radius: 10px; 
            border: 3px solid #eee; cursor: pointer; transition: 0.3s;
            object-fit: cover; scroll-snap-align: start;
        }
        .template-thumb.active { border-color: #25d366; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* 2. ÁREA DEL LIENZO DILÁMICO */
        #canvas-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: #eee; position: relative; overflow: hidden;
        }
        canvas { 
            background: white; max-width: 100%; max-height: 100%;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }

        /* 3. BOTÓN FLOTANTE (TECLADO DE HERRAMIENTAS) */
        #btn-tools {
            position: fixed; bottom: 20px; right: 20px;
            width: 70px; height: 70px; background: #25d366;
            border-radius: 50%; border: none; font-size: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000;
        }

        /* 4. TECLADO DE HERRAMIENTAS (PANEL EMERGENTE ANIMADO) */
        #toolbar-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60vh;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            border-top: 5px solid #25d366; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; transition: bottom 0.5s ease-out; z-index: 900;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        #toolbar-panel.open { bottom: 0; }

        .palette { display: flex; gap: 10px; overflow-x: auto; width: 100%; justify-content: center; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 15px; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .color-dot.active { transform: scale(1.2); border-color: #333; }

        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-top: 15px; }
        .tool-btn { 
            background: #f0f0f0; border: none; border-radius: 15px; padding: 15px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .tool-btn:hover { background: #e0e0e0; }
        .tool-btn.active { background: #25d366; color: #fff; }
        .tool-icon { font-size: 30px; }
    </style>
</head>
<body>

    <div id="carousel-container">
        </div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas" width="1000" height="1000"></canvas>
    </div>

    <button id="btn-tools" onclick="toggleTools()">🎨</button>

    <div id="toolbar-panel">
        <div class="palette">
            <div class="color-dot active" style="background: black;" onclick="setColor('black')"></div>
            <div class="color-dot" style="background: red;" onclick="setColor('red')"></div>
            <div class="color-dot" style="background: blue;" onclick="setColor('blue')"></div>
            <div class="color-dot" style="background: yellow;" onclick="setColor('yellow')"></div>
            <div class="color-dot" style="background: green;" onclick="setColor('green')"></div>
            <div class="color-dot" style="background: orange;" onclick="setColor('orange')"></div>
        </div>

        <div class="tool-grid">
            <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">
                <span class="tool-icon">🖌️</span>Lápiz
            </button>
            <button class="tool-btn" id="btn-bucket" onclick="setTool('bucket')">
                <span class="tool-icon">🪣</span>Balde
            </button>
            <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">
                <span class="tool-icon">🧼</span>Borrador
            </button>
            <button class="tool-btn" id="btn-rainbow" onclick="setTool('rainbow')">
                <span class="tool-icon">🌈</span>Arcoíris
            </button>
            <button class="tool-btn" id="btn-triple" onclick="setTool('triple')">
                <span class="tool-icon">🔱</span>3 Puntos
            </button>
            <button class="tool-btn" style="background: #F44336; color: white;" onclick="clearCanvas()">
                <span class="tool-icon">🗑️</span>Limpiar
            </button>
        </div>
    </div>

<script>
    // --- VARIABLES GLOBALES ---
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentColor = 'black';
    let currentTool = 'brush';
    let templateImage = new Image();

    // --- 1. GENERAR CARRUSEL DE 80 PLANTILLAS ---
    const carousel = document.getElementById('carousel-container');
    const totalPlantillas = 80;

    for (let i = 1; i <= totalPlantillas; i++) {
        const thumb = document.createElement('img');
        thumb.src = `plantillas/plantilla_${i}.png`; // Ruta de tus imágenes de 1000x1000
        thumb.className = 'template-thumb';
        thumb.alt = `Plantilla ${i}`;
        if (i === 1) thumb.classList.add('active'); // La primera por defecto
        
        thumb.onclick = () => {
            // Desactivar thumb previa
            document.querySelector('.template-thumb.active')?.classList.remove('active');
            // Activar thumb nueva
            thumb.classList.add('active');
            // Cargar plantilla en el canvas
            loadTemplate(thumb.src);
        };
        carousel.appendChild(thumb);
    }

    // --- 2. CONFIGURACIÓN DEL LIENZO ---
    function loadTemplate(url) {
        templateImage.src = url;
        templateImage.onload = () => {
            // Limpiar canvas antes de cargar la plantilla
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Dibujar la plantilla como fondo (1000x1000)
            ctx.drawImage(templateImage, 0, 0, 1000, 1000);
            ctx.beginPath(); // Reiniciar trazos
        };
    }

    // Iniciar con la primera plantilla
    loadTemplate('plantillas/plantilla_1.png');

    // --- 3. LÓGICA DE HERRAMIENTAS (LÁPIZ, BALDE, ARCOÍRIS, 3 PUNTOS) ---
    
    // Función para manejar el Teclado de Herramientas
    function toggleTools() {
        document.getElementById('toolbar-panel').classList.toggle('open');
    }

    function setColor(color) {
        currentColor = color;
        // Reiniciar Arcoíris si estaba activo
        if (currentTool === 'rainbow') currentTool = 'brush';
        // Desactivar borrador inteligente
        if (currentTool === 'eraser') currentTool = 'brush';
        
        // Actualizar visual de paleta
        document.querySelector('.color-dot.active').classList.remove('active');
        event.target.classList.add('active');
        updateToolsUI();
    }

    function setTool(tool) {
        currentTool = tool;
        updateToolsUI();
        if (tool !== 'bucket') toggleTools(); // Esconder menú al elegir herramienta que no sea balde
    }

    function updateToolsUI() {
        // Desactivar botón activo previo
        document.querySelector('.tool-btn.active')?.classList.remove('active');
        // Activar botón nuevo
        if (currentTool === 'brush') document.getElementById('btn-brush').classList.add('active');
        if (currentTool === 'bucket') document.getElementById('btn-bucket').classList.add('active');
        if (currentTool === 'eraser') document.getElementById('btn-eraser').classList.add('active');
        if (currentTool === 'rainbow') document.getElementById('btn-rainbow').classList.add('active');
        if (currentTool === 'triple') document.getElementById('btn-triple').classList.add('active');
    }

    function clearCanvas() {
        if (confirm('¿Seguro que quieres borrar todo el dibujo?')) {
            loadTemplate(templateImage.src); // Recarga la plantilla original
            toggleTools();
        }
    }

    // --- 4. MANEJO DE DIBUJO TÁCTIL (MÓVIL / TERMUX) ---
    
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        // Ajuste preciso de coordenadas al tamaño original de 1000x1000
        return {
            x: (clientX - rect.left) * (1000 / rect.width),
            y: (clientY - rect.top) * (1000 / rect.height)
        };
    }

    function startDrawing(e) {
        isDrawing = true;
        const {x, y} = getCoords(e);
        
        // Manejo especial para BALDE (Flood Fill)
        if (currentTool === 'bucket') {
            floodFill(x, y, currentColor);
            return; // No dibujar
        }

        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function draw(e) {
        if (!isDrawing) return;
        if (currentTool === 'bucket') return; // No dibujar con balde
        e.preventDefault(); // Bloquear scroll accidental

        const {x, y} = getCoords(e);
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        // Lógica de PINCEL / BORRADOR / 3 PUNTOS / ARCOÍRIS
        if (currentTool === 'brush' || currentTool === 'eraser') {
            ctx.lineWidth = 15;
            ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor; // Borrador usa blanco
            ctx.lineTo(x, y);
            ctx.stroke();
        } else if (currentTool === 'rainbow') {
            ctx.lineWidth = 15;
            ctx.strokeStyle = `hsl(${Date.now() % 360}, 100%, 50%)`; // Ciclo automático de colores
            ctx.lineTo(x, y);
            ctx.stroke();
        } else if (currentTool === 'triple') {
            ctx.lineWidth = 5;
            ctx.strokeStyle = currentColor;
            // Dibuja tres líneas paralelas
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x+10, y+10);
            ctx.lineTo(x+10, y+10); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x-10, y-10);
            ctx.lineTo(x-10, y-10); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }
    }

    function stopDrawing() { isDrawing = false; }

    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);

    // --- 5. ALGORITMO MÁGICO DE BALDE (FLOOD FILL) ---
    function floodFill(startX, startY, fillCol) {
        // Redondeamos coordenadas para trabajar con píxeles enteros
        startX = Math.floor(startX); startY = Math.floor(startY);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const width = canvas.width; const height = canvas.height;
        const startPos = (startY * width + startX) * 4;
        
        // Obtenemos el color original del píxel donde se hizo el toque
        const targetR = data[startPos];
        const targetG = data[startPos + 1];
        const targetB = data[startPos + 2];
        const targetA = data[startPos + 3];

        // Convertimos el color de relleno (hex/name) a RGBA
        const tempCtx = document.createElement('canvas').getContext('2d');
        tempCtx.fillStyle = fillCol;
        const fillColRGBA = tempCtx.fillStyle; // Obtenemos el valor computado (ej: "#ff0000")
        const r = parseInt(fillColRGBA.slice(1, 3), 16);
        const g = parseInt(fillColRGBA.slice(3, 5), 16);
        const b = parseInt(fillColRGBA.slice(5, 7), 16);
        const a = 255; // Opacidad total

        // Si el color original es el mismo que el color de relleno, no hacemos nada
        if (targetR === r && targetG === g && targetB === b && targetA === a) return;

        // Implementación del algoritmo "Scanline Flood Fill" (Rápida y no recursiva)
        const pixelStack = [[startX, startY]];
        while (pixelStack.length > 0) {
            const [x, y] = pixelStack.pop();
            let pos = (y * width + x) * 4;
            let currentY = y;

            // Buscamos hacia arriba el primer píxel que no coincida
            while (currentY-- >= 0 && matchColor(pos)) { pos -= width * 4; }
            pos += width * 4; currentY++;

            let reachLeft = false; let reachRight = false;

            // Rellenamos hacia abajo
            while (currentY++ < height - 1 && matchColor(pos)) {
                colorPixel(pos);
                // Comprobamos el píxel de la izquierda
                if (x > 0) {
                    if (matchColor(pos - 4)) {
                        if (!reachLeft) {
                            pixelStack.push([x - 1, currentY]);
                            reachLeft = true;
                        }
                    } else if (reachLeft) { reachLeft = false; }
                }
                // Comprobamos el píxel de la derecha
                if (x < width - 1) {
                    if (matchColor(pos + 4)) {
                        if (!reachRight) {
                            pixelStack.push([x + 1, currentY]);
                            reachRight = true;
                        }
                    } else if (reachRight) { reachRight = false; }
                }
                pos += width * 4;
            }
        }
        // Actualizamos el canvas con los nuevos píxeles rellenos
        ctx.putImageData(imageData, 0, 0);

        function matchColor(pos) {
            return (data[pos] === targetR && data[pos + 1] === targetG &&
                    data[pos + 2] === targetB && data[pos + 3] === targetA);
        }
        function colorPixel(pos) {
            data[pos] = r; data[pos + 1] = g; data[pos + 2] = b; data[pos + 3] = a;
        }
    }
</script>
</body>
</html>
