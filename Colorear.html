<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Kids - Súper Pizarrón de Arte 🎨</title>
    <style>
        * { box-sizing: border-box; touch-action: pan-x pan-y; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #222; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; }
        
        /* CABECERA CON BOTÓN REGRESO */
        #header-drawing {
            display: flex; align-items: center; background: #fff; height: 7vh; padding: 0 15px; border-bottom: 1px solid #ddd;
        }
        .btn-back {
            text-decoration: none; background: #f0f0f0; color: #333; padding: 6px 12px; border-radius: 15px; font-size: 14px; font-weight: bold; border: 1px solid #ccc;
        }

        /* 1. CARRUSEL SUPERIOR */
        #carousel-container {
            height: 14vh; background: #fff; border-bottom: 3px solid #25d366;
            display: flex; align-items: center; overflow-x: auto; padding: 10px; gap: 12px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .template-thumb { height: 90%; aspect-ratio: 1/1; border-radius: 10px; border: 3px solid #eee; object-fit: cover; flex-shrink: 0; cursor: pointer; }
        .template-thumb.active { border-color: #25d366; transform: scale(1.05); }

        /* 2. ÁREA DE DIBUJO */
        #canvas-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: #eee; position: relative; }
        canvas { background: white; max-width: 98%; max-height: 98%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.3); touch-action: none; }

        /* 3. BOTÓN FLOTANTE */
        #btn-tools {
            position: fixed; bottom: 25px; right: 20px; width: 70px; height: 70px; 
            background: #25d366; border-radius: 50%; border: 4px solid white; font-size: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000;
        }

        /* 4. PANEL DE HERRAMIENTAS */
        #toolbar-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 45vh;
            background: white; border-top: 5px solid #25d366; border-radius: 25px 25px 0 0;
            display: flex; flex-direction: column; padding: 20px; transition: 0.4s; z-index: 999;
        }
        #toolbar-panel.open { bottom: 0; }
        
        .palette { display: flex; gap: 12px; overflow-x: auto; margin-bottom: 20px; padding: 10px 5px; }
        .color-dot { width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0; border: 3px solid #eee; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .tool-btn { padding: 18px; border-radius: 15px; border: none; background: #f0f0f0; font-weight: bold; font-size: 16px; }
        .tool-btn.active { background: #25d366; color: white; }
    </style>
</head>
<body>

    <div id="header-drawing">
        <a href="index.html" class="btn-back">🏠 Inicio</a>
        <span style="margin-left: 15px; font-size: 14px; color: #666;">¡A pintar!</span>
    </div>

    <div id="carousel-container"></div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas" width="1000" height="1000"></canvas>
    </div>

    <button id="btn-tools" onclick="toggleTools()">🖌️</button>

    <div id="toolbar-panel">
        <div class="palette" id="palette"></div>
        <div class="tool-grid">
            <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">✏️ Lápiz</button>
            <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">🧽 Goma</button>
            <button class="tool-btn" style="background: #ff4444; color: white;" onclick="confirmarLimpieza()">🗑️ Borrar</button>
            <button class="tool-btn" style="background: #3498db; color: white;" onclick="descargar()">💾 Guardar</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const carousel = document.getElementById('carousel-container');
    let currentColor = '#000000';
    let currentTool = 'brush';
    let isDrawing = false;
    let currentTemplateUrl = "";

    const misPlantillas = [
        '1_20260212_143632_0000.png', '1_20260212_153720_0000.png', '1_20260217_094136_0000.png', '1_20260314_190631_0000.png',
        '20260314_184050_0000.png', '20260314_184050_0001.png', '20260314_184051_0002.png', '20260314_184051_0003.png',
        '20260314_184051_0004.png', '20260314_184051_0005.png', '20260314_184051_0006.png', '20260314_184051_0007.png',
        '20260314_184051_0008.png', '20260314_184051_0009.png', '20260314_184209_0000.png', '20260314_184210_0001.png',
        '20260314_184210_0002.png', '20260314_184210_0003.png', '20260314_184210_0004.png', '20260314_184210_0005.png',
        '20260314_184210_0006.png', '20260314_184210_0007.png', '20260314_184210_0008.png', '20260314_184210_0009.png',
        '20260314_184924_0000.png', '20260314_184924_0001.png', '20260314_184924_0002.png', '20260314_184925_0003.png',
        '20260314_184925_0004.png', '20260314_184925_0005.png', '20260314_184925_0006.png', '20260314_184925_0007.png',
        '20260314_184925_0008.png', '20260314_184925_0009.png', '20260314_184925_0010.png', '20260314_185632_0000.png',
        '20260314_185632_0001.png', '20260314_185633_0002.png', '20260314_185633_0003.png', '20260314_185633_0004.png'
    ];

    function init() {
        misPlantillas.forEach((imgName, i) => {
            const img = document.createElement('img');
            img.src = `plantillas/${imgName}`;
            img.className = 'template-thumb';
            img.loading = "lazy";
            img.onclick = () => {
                document.querySelectorAll('.template-thumb').forEach(t => t.classList.remove('active'));
                img.classList.add('active');
                loadImg(img.src);
            };
            carousel.appendChild(img);
            if(i === 0) { img.classList.add('active'); loadImg(img.src); }
        });

        const colors = ['#000000', '#FF0000', '#0000FF', '#008000', '#FFFF00', '#FFA500', '#800080', '#FFC0CB'];
        const palette = document.getElementById('palette');
        colors.forEach(c => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.background = c;
            dot.onclick = () => { currentColor = c; toggleTools(); };
            palette.appendChild(dot);
        });
    }

    function loadImg(url) {
        currentTemplateUrl = url;
        const img = new Image();
        img.src = url;
        img.onload = () => {
            ctx.clearRect(0, 0, 1000, 1000);
            ctx.drawImage(img, 0, 0, 1000, 1000);
        };
    }

    function toggleTools() { document.getElementById('toolbar-panel').classList.toggle('open'); }
    function setTool(t) { 
        currentTool = t; 
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${t}`).classList.add('active');
        if(t === 'brush') toggleTools();
    }

    function confirmarLimpieza() { if(confirm('¿Limpiar dibujo?')) { loadImg(currentTemplateUrl); toggleTools(); } }
    function descargar() {
        const link = document.createElement('a');
        link.download = 'mi-dibujo-happy-kids.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.touches[0].clientX - rect.left) * (1000 / rect.width),
            y: (e.touches[0].clientY - rect.top) * (1000 / rect.height)
        };
    }

    canvas.addEventListener('touchstart', (e) => {
        isDrawing = true;
        const p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
    });

    canvas.addEventListener('touchmove', (e) => {
        if(!isDrawing) return;
        const p = getPos(e);
        ctx.lineWidth = currentTool === 'eraser' ? 50 : 18;
        ctx.lineCap = 'round';
        ctx.strokeStyle = currentTool === 'eraser' ? 'white' : currentColor;
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    });

    canvas.addEventListener('touchend', () => isDrawing = false);

    init();
</script>
</body>
</html>
