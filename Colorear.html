<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Kids - Súper Pizarrón 🎨</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #222; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; }
        
        /* 1. ÁREA DE DIBUJO */
        #canvas-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: #eee; position: relative; overflow: hidden; }
        canvas { background: white; max-width: 98%; max-height: 98%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: block; }

        /* 2. CARRUSEL DE IMÁGENES (Arriba) */
        #carousel-container {
            height: 12vh; background: #fff; border-bottom: 2px solid #ddd;
            display: flex; align-items: center; overflow-x: auto; padding: 8px; gap: 10px;
        }
        .template-thumb { height: 90%; aspect-ratio: 1/1; border-radius: 8px; border: 3px solid #eee; object-fit: cover; flex-shrink: 0; }
        .template-thumb.active { border-color: #25d366; transform: scale(1.05); }

        /* 3. BOTÓN FLOTANTE (Para abrir herramientas) */
        #btn-tools {
            position: fixed; bottom: 5vh; right: 20px; width: 65px; height: 65px; 
            background: #25d366; border-radius: 50%; border: none; font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000;
        }

        /* 4. TECLADO DE HERRAMIENTAS (Panel emergente) */
        #toolbar-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 50vh;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            border-top: 5px solid #25d366; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; padding: 15px; transition: 0.4s; z-index: 999;
        }
        #toolbar-panel.open { bottom: 0; }

        .palette { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding: 5px; }
        .color-dot { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.2); flex-shrink: 0; }
        .color-dot.active { transform: scale(1.2); border-color: #333; }

        .tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tool-btn { padding: 15px; border-radius: 12px; border: none; background: #f0f0f0; font-weight: bold; font-size: 14px; }
        .tool-btn.active { background: #25d366; color: white; }
    </style>
</head>
<body>

    <div id="carousel-container"></div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas" width="1000" height="1000"></canvas>
    </div>

    <button id="btn-tools" onclick="toggleTools()">🖌️</button>

    <div id="toolbar-panel">
        <div class="palette" id="palette"></div>
        <div class="tool-grid">
            <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')">✏️ Lápiz</button>
            <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')">🧽 Borrador</button>
            <button class="tool-btn" style="background: #ff4444; color: white;" onclick="limpiarCanvas()">🗑️ Limpiar</button>
            <button class="tool-btn" style="background: #3498db; color: white;" onclick="descargarDibujo()">💾 Guardar</button>
            <button class="tool-btn" onclick="toggleTools()">❌ Cerrar</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const carousel = document.getElementById('carousel-container');
    const panel = document.getElementById('toolbar-panel');
    let currentColor = 'black';
    let currentTool = 'brush';
    let isDrawing = false;

    // LISTA DE TUS ARCHIVOS REALES (Basado en tus capturas)
    const misPlantillas = [
        '20260319_115832_0000.png', '20260319_115912_0000.png', 
        '20260319_115947_0000.png', '20260319_120007_0000.png',
        '20260319_120125_0000.png', '20260319_120205_0000.png',
        '20260314_184050_0000.png', '20260314_190631_0000.png',
        'Burro_20260217_113452_0000.png', 'Uno_20260217_130621_0000.png'
    ];

    function init() {
        // Cargar Carrusel
        misPlantillas.forEach((imgName, i) => {
            const img = document.createElement('img');
            img.src = `plantillas/${imgName}`;
            img.className = 'template-thumb';
            img.onclick = () => {
                document.querySelectorAll('.template-thumb').forEach(t => t.classList.remove('active'));
                img.classList.add('active');
                loadImg(img.src);
            };
            carousel.appendChild(img);
            if(i === 0) { img.classList.add('active'); loadImg(img.src); }
        });

        // Cargar Colores
        const colors = ['#000000', '#FF0000', '#0000FF', '#008000', '#FFFF00', '#FFA500', '#800080', '#FFC0CB', '#8B4513'];
        const palette = document.getElementById('palette');
        colors.forEach(c => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.background = c;
            dot.onclick = () => {
                currentColor = c;
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                if(currentTool === 'eraser') setTool('brush');
            };
            palette.appendChild(dot);
        });
    }

    function loadImg(url) {
        const img = new Image();
        img.src = url;
        img.onload = () => {
            ctx.clearRect(0, 0, 1000, 1000);
            ctx.drawImage(img, 0, 0, 1000, 1000);
        };
    }

    function toggleTools() { panel.classList.toggle('open'); }

    function setTool(t) { 
        currentTool = t; 
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${t}`).classList.add('active');
        if (t === 'brush') toggleTools(); // Cierra el panel al elegir lápiz para dibujar
    }

    function limpiarCanvas() { if(confirm('¿Borrar todo el dibujo?')) { location.reload(); } }

    function descargarDibujo() {
        const link = document.createElement('a');
        link.download = 'mi-dibujo-happy-kids.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // Eventos de dibujo para celular
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.touches[0].clientX - rect.left) * (1000 / rect.width),
            y: (e.touches[0].clientY - rect.top) * (1000 / rect.height)
        };
    }

    canvas.addEventListener('touchstart', (e) => {
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    });

    canvas.addEventListener('touchmove', (e) => {
        if(!isDrawing) return;
        const pos = getPos(e);
        ctx.lineWidth = currentTool === 'eraser' ? 40 : 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = currentTool === 'eraser' ? 'white' : currentColor;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    });

    canvas.addEventListener('touchend', () => isDrawing = false);

    init();
</script>
</body>
</html>
