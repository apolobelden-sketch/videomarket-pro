<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Kids - Pizza Mate 🍕</title>
    <style>
        /* ESTILOS VISUALES Y TÁCTILES */
        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #FF9800; font-family: 'Arial Rounded MT Bold', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* CABECERA Y BOTÓN REGRESO */
        #header-mate { background: #fff; height: 8vh; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 3px solid #E65100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; }
        .btn-back { text-decoration: none; background: #FF5722; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 2px solid #fff; }
        #score-board { font-size: 20px; color: #333; font-weight: bold; }

        /* ÁREA DE JUEGO PRINCIPAL */
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; position: relative; }

        /* EL RETO (Instrucción Visual) */
        #challenge-text { background: rgba(255,255,255,0.9); padding: 15px 25px; border-radius: 30px; font-size: 24px; color: #333; border: 3px solid #E65100; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-align: center; max-width: 90%; }
        #target-number { font-size: 32px; color: #E65100; font-weight: bold; margin: 0 5px; }

        /* ZONA DE SOLTAR (El Plato Grande) */
        #drop-zone { width: 280px; height: 280px; background: url('https://res.cloudinary.com/dgdw8fbku/image/upload/v1711223456/plato_v6u5r6.png') no-repeat center; background-size: contain; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.3s; }
        #drop-zone.hover { transform: scale(1.1); filter: brightness(1.2); }
        
        /* PIZZA FINAL (Oculta hasta ganar) */
        #pizza-complete { width: 90%; height: 90%; background: url('https://res.cloudinary.com/dgdw8fbku/image/upload/v1711223456/pizza_completa_s8y5r2.png') no-repeat center; background-size: contain; position: absolute; opacity: 0; transform: scale(0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #pizza-complete.show { opacity: 1; transform: scale(1); }

        /* ZONA DE ARRASTRAR (Las Rebanadas) */
        #drag-zone { width: 100%; height: 20vh; display: flex; justify-content: center; gap: 15px; padding: 10px; background: rgba(255,255,255,0.3); border-radius: 20px 20px 0 0; }
        .slice { width: 60px; height: 80px; background: url('https://res.cloudinary.com/dgdw8fbku/image/upload/v1711223456/rebanada_v2_j4r7f8.png') no-repeat center; background-size: contain; cursor: grab; position: relative; z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .slice.dragging { opacity: 0.5; transform: scale(1.2) rotate(10deg); cursor: grabbing; z-index: 1000; }

        /* EFECTOS DE CELEBRACIÓN */
        .confetti { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; opacity: 0; animation: confetti-fall 1s ease-out forwards; }
        @keyframes confetti-fall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(200px) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="header-mate">
        <a href="Colorear.html" class="btn-back">⬅ Volver</a>
        <div id="score-board">🏆 <span id="points">0</span></div>
    </div>

    <div id="game-area">
        <div id="challenge-text">¡Arrastra <span id="target-number">?</span> rebanadas al plato! 🍕</div>

        <div id="drop-zone">
            <div id="pizza-complete"></div>
        </div>

        <div id="drag-zone">
            <div class="slice" draggable="true" id="s1"></div>
            <div class="slice" draggable="true" id="s2"></div>
            <div class="slice" draggable="true" id="s3"></div>
            <div class="slice" draggable="true" id="s4"></div>
            <div class="slice" draggable="true" id="s5"></div>
        </div>
    </div>

<script>
    // LÓGICA DE JUEGO (Vanilla JS - Sin APIs)
    let points = 0;
    let targetAmount;
    let currentInPlate = 0;
    const dropZone = document.getElementById('drop-zone');
    const pizzaComplete = document.getElementById('pizza-complete');
    const pointsDisplay = document.getElementById('points');
    const targetDisplay = document.getElementById('target-number');
    const slices = document.querySelectorAll('.slice');

    // SONIDOS (Usa Cloudinary para carga rápida)
    const sndCorrect = new Audio('https://res.cloudinary.com/dgdw8fbku/video/upload/v1711223901/correct_uz1k2c.mp3');
    const sndWin = new Audio('https://res.cloudinary.com/dgdw8fbku/video/upload/v1711223901/pizza-win_k3r8f1.mp3');

    // 1. INICIAR NUEVO RETO ALEATORIO
    function nextChallenge() {
        currentInPlate = 0;
        targetAmount = Math.floor(Math.random() * 4) + 2; // Pide entre 2 y 5 rebanadas
        targetDisplay.innerText = targetAmount;
        pizzaComplete.classList.remove('show');
        slices.forEach(s => s.style.display = 'block'); // Regenera rebanadas
        document.querySelectorAll('.drop-zone-slice').forEach(s => s.remove()); // Limpia plato
    }

    // 2. CONFIGURAR DRAG & DROP (Táctil para Móvil)
    slices.forEach(slice => {
        // Para PC (Mouse)
        slice.addEventListener('dragstart', dragStart);
        slice.addEventListener('dragend', dragEnd);

        // Para Móvil (Touch - Aquí está el secreto de la motricidad)
        slice.addEventListener('touchstart', touchStart, {passive: false});
        slice.addEventListener('touchmove', touchMove, {passive: false});
        slice.addEventListener('touchend', touchEnd);
    });

    dropZone.addEventListener('dragover', (e) => e.preventDefault());
    dropZone.addEventListener('drop', dropHandler);

    // Funciones Drag estándar
    function dragStart(e) { this.classList.add('dragging'); e.dataTransfer.setData('text/plain', this.id); }
    function dragEnd() { this.classList.remove('dragging'); }

    // Funciones Touch para Móvil (Calcula la posición del dedo)
    let draggedSlice = null;
    let touchOffsetX, touchOffsetY;

    function touchStart(e) {
        draggedSlice = this;
        draggedSlice.classList.add('dragging');
        const touch = e.touches[0];
        const rect = draggedSlice.getBoundingClientRect();
        touchOffsetX = touch.clientX - rect.left;
        touchOffsetY = touch.clientY - rect.top;
        e.preventDefault();
    }

    function touchMove(e) {
        if (!draggedSlice) return;
        const touch = e.touches[0];
        draggedSlice.style.position = 'fixed';
        draggedSlice.style.left = (touch.clientX - touchOffsetX) + 'px';
        draggedSlice.style.top = (touch.clientY - touchOffsetY) + 'px';
        
        // Verifica si está sobre el plato (dropZone)
        const dzRect = dropZone.getBoundingClientRect();
        if (touch.clientX > dzRect.left && touch.clientX < dzRect.right &&
            touch.clientY > dzRect.top && touch.clientY < dzRect.bottom) {
            dropZone.classList.add('hover');
        } else {
            dropZone.classList.remove('hover');
        }
        e.preventDefault();
    }

    function touchEnd(e) {
        if (!draggedSlice) return;
        draggedSlice.classList.remove('dragging');
        const touch = e.changedTouches[0];
        const dzRect = dropZone.getBoundingClientRect();

        // Si suelta dentro del plato
        if (touch.clientX > dzRect.left && touch.clientX < dzRect.right &&
            touch.clientY > dzRect.top && touch.clientY < dzRect.bottom) {
            handleSuccessfulDrop(draggedSlice);
        } else {
            // Regresa a su lugar si falla
            draggedSlice.style.position = 'static';
        }
        
        dropZone.classList.remove('hover');
        draggedSlice = null;
    }

    // Manejador común de soltar exitoso
    function dropHandler(e) {
        e.preventDefault();
        const sliceId = e.dataTransfer.getData('text/plain');
        const slice = document.getElementById(sliceId);
        handleSuccessfulDrop(slice);
        dropZone.classList.remove('hover');
    }

    // 3. VERIFICACIÓN Y CELEBRACIÓN ADICTIVA
    function handleSuccessfulDrop(slice) {
        slice.style.display = 'none'; // Desaparece de abajo
        slice.style.position = 'static'; // Resetea estilos de touch
        
        currentInPlate++;
        sndCorrect.play(); // Sonido corto de "Click"

        // Verifica si completó el reto
        if (currentInPlate === targetAmount) {
            points += 10;
            pointsDisplay.innerText = points;
            pizzaComplete.classList.add('show'); // Muestra pizza completa
            sndWin.play(); // Sonido de victoria
            createConfetti(); // Brillantina visual
            setTimeout(nextChallenge, 2000); // Siguiente reto en 2 segs
        }
    }

    // Efecto visual de brillantina
    function createConfetti() {
        for(let i=0; i<30; i++){
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = Math.random() * 100 + '%';
            c.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.animationDelay = Math.random() + 's';
            dropZone.appendChild(c);
            setTimeout(() => c.remove(), 1500);
        }
    }

    // Iniciar el primer reto
    nextChallenge();
</script>
</body>
</html>
