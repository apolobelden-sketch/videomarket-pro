<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Kids - Matemática Pro</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f0f4f8;
    text-align:center;
}

.screen { display:none; padding:20px; }
.active { display:block; }

h1 { color:#ff5722; }

.btn {
    display:block;
    margin:15px auto;
    padding:15px;
    width:80%;
    border:none;
    border-radius:20px;
    background:#4caf50;
    color:#fff;
    font-size:18px;
    font-weight:bold;
}

.card {
    background:#fff;
    padding:20px;
    border-radius:20px;
    margin:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.big {
    font-size:40px;
    margin:20px;
}

input {
    padding:10px;
    font-size:20px;
    width:100px;
    text-align:center;
    border-radius:10px;
    border:1px solid #ccc;
}

.feedback {
    font-size:22px;
    margin:15px;
}

</style>
</head>

<body>

<!-- MENÚ -->
<div id="menu" class="screen active">
    <h1>🍕 Aventura Matemática</h1>

    <button class="btn" onclick="openGame('suma')">🍎 Suma</button>
    <button class="btn" onclick="openGame('resta')">🚀 Resta</button>
    <button class="btn" onclick="openGame('conteo')">🦖 Conteo</button>
    <button class="btn" onclick="openGame('fraccion')">🍕 Fracciones</button>

    <h3>⭐ Puntos: <span id="score">0</span></h3>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
    <h1 id="titulo"></h1>

    <div class="big" id="pregunta"></div>

    <input id="respuesta" type="number">
    <button class="btn" onclick="verificar()">Responder</button>

    <div class="feedback" id="feedback"></div>

    <button class="btn" onclick="volver()">⬅ Volver</button>
</div>

<script>
let juego = "";
let n1 = 0;
let n2 = 0;
let score = 0;
let correcta = 0;

function openGame(tipo){
    juego = tipo;
    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    document.getElementById("feedback").innerHTML="";
    document.getElementById("respuesta").value="";
    generar();
}

function generar(){
    n1 = Math.floor(Math.random()*10);
    n2 = Math.floor(Math.random()*10);

    if(juego==="suma"){
        document.getElementById("titulo").innerHTML="🍎 Suma";
        document.getElementById("pregunta").innerHTML=`${n1} + ${n2}`;
        correcta = n1 + n2;
    }

    if(juego==="resta"){
        document.getElementById("titulo").innerHTML="🚀 Resta";
        document.getElementById("pregunta").innerHTML=`${n1} - ${n2}`;
        correcta = n1 - n2;
    }

    if(juego==="conteo"){
        document.getElementById("titulo").innerHTML="🦖 Cuenta";
        let emojis = "🦖".repeat(n1);
        document.getElementById("pregunta").innerHTML=emojis;
        correcta = n1;
    }

    if(juego==="fraccion"){
        document.getElementById("titulo").innerHTML="🍕 Fracción";
        let total = 4;
        let parte = Math.floor(Math.random()*4)+1;
        document.getElementById("pregunta").innerHTML=`¿Cuántas partes de ${total}? (muestra ${parte})`;
        correcta = parte;
    }
}

function verificar(){
    let user = parseInt(document.getElementById("respuesta").value);

    if(user === correcta){
        document.getElementById("feedback").innerHTML="🎉 Correcto!";
        score++;
    } else {
        document.getElementById("feedback").innerHTML="❌ Era " + correcta;
    }

    document.getElementById("score").innerHTML=score;

    setTimeout(()=>{
        document.getElementById("respuesta").value="";
        document.getElementById("feedback").innerHTML="";
        generar();
    },1500);
}

function volver(){
    document.getElementById("game").classList.remove("active");
    document.getElementById("menu").classList.add("active");
}
</script>

</body>
</html>
