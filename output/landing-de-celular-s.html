<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Galaxy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .header h1 {
            margin: 0;
            padding: 10px;
        }
        .contenido {
            padding: 20px;
        }
        .contenido img {
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            display: block;
        }
        .boton {
            background-color: #03A9F4;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin: 20px auto;
            width: 200px;
            text-align: center;
        }
        .boton:hover {
            background-color: #0277BD;
        }
        @media only screen and (max-width: 768px) {
            .container {
                margin: 20px auto;
            }
        }
        @media only screen and (max-width: 480px) {
            .container {
                margin: 10px auto;
            }
            .boton {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Samsung Galaxy</h1>
        </div>
        <div class="contenido">
            <img src="https://www.samsung.com/etc/client/contents/samsung/es_es/images/smartphones/galaxy-s22-ultra/s22-ultra-hero-01.jpg" alt="Samsung Galaxy">
            <p>El Samsung Galaxy es un teléfono inteligente con una pantalla de 6,2 pulgadas, procesador octa-core, 12 GB de RAM y cámara principal de 50 MP.</p>
            <a href="https://meli.la/11mpFrD" class="boton">Comprar en Mercado Libre</a>
        </div>
    </div>
</body>
</html>
